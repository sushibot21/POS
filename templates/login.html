<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login — {{ settings.restaurant_name }}</title>
<link href="https://fonts.googleapis.com/css2?family=Plus Jakarta Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#f0ede8;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.login-wrap{width:100%;max-width:420px;padding:20px;}
.login-card{background:#fff;border:1.5px solid #e4dfd8;border-radius:18px;padding:36px 32px;box-shadow:0 10px 40px rgba(26,23,20,0.1);}
.logo{text-align:center;margin-bottom:28px;}
.logo-icon{width:60px;height:60px;background:#2563eb;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 12px;box-shadow:0 4px 14px rgba(37,99,235,0.35);}
.logo h1{font-size:22px;font-weight:800;color:#1a1714;letter-spacing:-0.5px;}
.logo p{font-size:13px;color:#6b6460;margin-top:3px;}
.field{margin-bottom:16px;}
label{font-size:12px;font-weight:700;color:#6b6460;display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:0.5px;}
input{width:100%;background:#f8f6f3;border:1.5px solid #e4dfd8;color:#1a1714;border-radius:9px;padding:11px 14px;font-family:'Plus Jakarta Sans';font-size:14px;outline:none;transition:all 0.15s;}
input:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,0.1);background:#fff;}
.btn-login{width:100%;background:#2563eb;color:white;border:none;border-radius:9px;padding:13px;font-family:'Plus Jakarta Sans';font-size:15px;font-weight:700;cursor:pointer;transition:all 0.15s;margin-top:8px;box-shadow:0 3px 10px rgba(37,99,235,0.3);}
.btn-login:hover{background:#3b82f6;transform:translateY(-1px);}
.btn-login:active{transform:translateY(0);}
.error{background:#fff1f1;border:1px solid #fca5a5;border-radius:8px;padding:10px 14px;font-size:13px;color:#dc2626;margin-top:12px;display:none;}
.admin-link{text-align:center;margin-top:20px;font-size:12px;color:#b5afa9;}
.admin-link a{color:#2563eb;text-decoration:none;font-weight:600;}
.admin-link a:hover{text-decoration:underline;}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="logo">
      {% if settings.logo_url %}<img src="{{ settings.logo_url }}" style="width:60px;height:60px;border-radius:12px;object-fit:cover;margin:0 auto 12px;display:block;">
      {% else %}<div class="logo-icon">🍽</div>{% endif %}
      <h1>{{ settings.restaurant_name }}</h1>
      <p>Biller Login — Enter your credentials</p>
    </div>
    <div class="field">
      <label>Biller ID</label>
      <input type="text" id="uid" placeholder="e.g. BILLER001" autocomplete="username" autofocus>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="pw" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn-login" onclick="doLogin()">Login to POS</button>
    <div class="error" id="err">Invalid ID or password. Please try again.</div>
    <div class="admin-link">Admin? <a href="/admin/login">Go to Admin Portal →</a></div>
  </div>
</div>
<script>
async function doLogin(){
  const uid=document.getElementById('uid').value.trim();
  const pw=document.getElementById('pw').value;
  if(!uid||!pw){document.getElementById('err').style.display='';document.getElementById('err').textContent='Please enter both ID and password.';return;}
  const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:uid,password:pw})});
  const d=await r.json();
  if(d.ok){window.location.href=d.redirect;}
  else{document.getElementById('err').style.display='';document.getElementById('err').textContent=d.error||'Login failed.';}
}
</script>
</body>
</html>
