<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Login</title>
<link href="https://fonts.googleapis.com/css2?family=Plus Jakarta Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#0d0d0d;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.card{background:#161616;border:1.5px solid #2a2a2a;border-radius:18px;padding:36px 32px;width:400px;box-shadow:0 20px 60px rgba(0,0,0,0.5);}
.icon{width:56px;height:56px;background:#2563eb;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 16px;}
h1{text-align:center;font-size:20px;font-weight:800;color:#f0f0f0;margin-bottom:4px;}
p{text-align:center;font-size:12px;color:#6b6460;margin-bottom:28px;}
label{font-size:11px;font-weight:700;color:#6b6460;display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:0.5px;}
input{width:100%;background:#1f1f1f;border:1.5px solid #2a2a2a;color:#f0f0f0;border-radius:9px;padding:11px 14px;font-family:'Plus Jakarta Sans';font-size:14px;outline:none;transition:all 0.15s;margin-bottom:14px;}
input:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,0.12);}
.btn{width:100%;background:#2563eb;color:white;border:none;border-radius:9px;padding:13px;font-family:'Plus Jakarta Sans';font-size:14px;font-weight:700;cursor:pointer;margin-top:4px;}
.btn:hover{background:#3b82f6;}
.err{background:rgba(220,38,38,0.12);border:1px solid rgba(220,38,38,0.3);border-radius:8px;padding:9px 12px;font-size:12px;color:#f87171;margin-top:10px;display:none;}
.back{text-align:center;margin-top:18px;font-size:12px;color:#6b6460;}
.back a{color:#2563eb;text-decoration:none;}
</style>
</head>
<body>
<div class="card">
  <div class="icon">🔐</div>
  <h1>Admin Portal</h1>
  <p>Restricted access — authorised personnel only</p>
  <label>Admin ID</label>
  <input type="text" id="uid" placeholder="Enter admin ID" autofocus>
  <label>Password</label>
  <input type="password" id="pw" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
  <button class="btn" onclick="doLogin()">Login to Admin</button>
  <div class="err" id="err">Invalid credentials.</div>
  <div class="back"><a href="/login">← Back to Biller Login</a></div>
</div>
<script>
async function doLogin(){
  const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:document.getElementById('uid').value.trim(),password:document.getElementById('pw').value})});
  const d=await r.json();
  if(d.ok&&d.role==='admin'){window.location.href=d.redirect;}
  else{document.getElementById('err').style.display='';document.getElementById('err').textContent=d.error||'Access denied.';}
}
</script>
</body>
</html>
