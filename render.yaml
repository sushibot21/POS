# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy: New +  ->  Blueprint  ->  pick this repo.
#
# Storage strategy: Render free tier has no persistent disk, so the SQLite
# database is hosted on Turso (managed libSQL). The app uses an embedded
# replica at /tmp on the Render instance — reads are fast and local, writes
# are propagated to Turso automatically. On every redeploy /tmp is wiped and
# the replica is rebuilt from Turso, so no data loss.
#
# Uploaded images (logo) live on the ephemeral filesystem and DO reset on
# each deploy. For a small POS that's usually fine — re-upload the logo once
# after a deploy. We can move them to object storage later if needed.

services:
  - type: web
    name: pos-system
    runtime: python
    plan: free
    branch: main
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class eventlet --workers 1 --bind 0.0.0.0:$PORT app:app
    healthCheckPath: /login
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SOCKETIO_ASYNC_MODE
        value: eventlet
      # Embedded-replica file lives in /tmp; gets rebuilt from Turso on each boot.
      - key: DB_PATH
        value: /tmp/pos_replica.db
      # Secrets — set fresh values in the Render dashboard before first deploy.
      # `sync: false` means Render will not read these from the Blueprint and
      # will instead prompt you for the value during setup.
      - key: SECRET_KEY
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: ADMIN_PASS
        sync: false
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
